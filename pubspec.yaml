name: jobhub_colaborador
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP (SOLO UNO)
  http: ^1.3.0

  permission_handler: ^12.0.3
  lottie: ^3.1.3

  shared_preferences: ^2.1.0
  table_calendar: ^3.0.9
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  cached_network_image: ^3.2.3
  url_launcher: ^6.1.10
  flutter_local_notifications: ^18.0.1
  shimmer: ^2.0.0
  intl: ^0.18.0

  fl_chart: ^0.69.0
  pdf: ^3.11.0
  printing: ^5.13.0
  share_plus: ^10.1.0
  flutter_svg: ^2.0.16
  auto_size_text: ^3.0.0

  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  flutter_polyline_points: ^2.1.0

  socket_io_client: ^3.1.1
  flutter_chat_ui: ^1.6.11
  flutter_chat_types: ^3.6.2

  audioplayers: ^6.0.0
  flutter_slidable: ^3.1.0
  percent_indicator: ^4.2.3

  desktop_drop: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Logo1.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/